name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: truxify-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/api/package-lock.json
      - name: Install dependencies
        working-directory: backend/api
        run: npm ci --workspaces=false --legacy-peer-deps
      - name: Run ESLint
        working-directory: backend/api
        run: npm run lint

  customer-lint:
    name: Customer App Analyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get shared dependencies
        working-directory: packages/truxify_shared
        run: flutter pub get
      - name: Get dependencies
        working-directory: apps/customer
        run: flutter pub get
      - name: Run Dart Analyzer
        working-directory: apps/customer
        run: dart analyze

  driver-lint:
    name: Driver App Analyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get shared dependencies
        working-directory: packages/truxify_shared
        run: flutter pub get
      - name: Get dependencies
        working-directory: apps/driver
        run: flutter pub get
      - name: Run Dart Analyzer
        working-directory: apps/driver
        run: dart analyze
