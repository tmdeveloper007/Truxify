name: Truxify CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: truxify-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install dependencies
        working-directory: backend/api
        run: npm ci --workspaces=false --legacy-peer-deps

      - name: Run unit tests
        working-directory: backend/api
        run: npm run test:unit

      - name: Run integration tests
        working-directory: backend/api
        run: npm run test:integration

  customer:
    name: Customer Flutter checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get shared dependencies
        working-directory: packages/truxify_shared
        run: flutter pub get

      - name: Get dependencies
        working-directory: apps/customer
        run: flutter pub get

      - name: Analyze
        working-directory: apps/customer
        run: flutter analyze

      - name: Test
        working-directory: apps/customer
        run: flutter test

  driver:
    name: Driver Flutter checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get shared dependencies
        working-directory: packages/truxify_shared
        run: flutter pub get

      - name: Get dependencies
        working-directory: apps/driver
        run: flutter pub get

      - name: Analyze
        working-directory: apps/driver
        run: flutter analyze

      - name: Test
        working-directory: apps/driver
        run: flutter test

  ml:
    name: ML engine tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/ml/requirements.txt

      - name: Install dependencies
        working-directory: backend/ml
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/ml
        run: python -m pytest tests/ -v

  contracts:
    name: Smart contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        working-directory: blockchain
        run: npm ci

      - name: Compile contracts
        working-directory: blockchain
        run: npx hardhat compile

      - name: Run contract tests
        working-directory: blockchain
        run: npx hardhat test

      - name: Verify backend ABI selectors match compiled contract
        run: bash scripts/check-escrow-abi.sh

  client-credentials-guard:
    name: No client-side backend credentials
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Check for Redis/Upstash credentials in Flutter source
        run: bash scripts/check-no-client-credentials.sh
