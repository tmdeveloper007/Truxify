name: truxify
description: Truxify customer-side Flutter app.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  truxify_shared:
    path: ../../packages/truxify_shared
  supabase_flutter: ^2.9.1
  flutter_map: ^8.3.0
  flutter_map_cancellable_tile_provider: ^3.0.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  latlong2: ^0.10.1
  http: ^1.2.2
  sqflite: ^2.3.0
  path: ^1.9.0
  connectivity_plus: ^7.1.1
  geocoding: ^5.0.0
  flutter_secure_storage: ^10.3.1
  geolocator: ^14.0.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  web_socket_channel: ^3.0.0
  local_auth: ^3.0.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  pdf: ^3.11.2
  printing: ^5.13.4
  qr: ^4.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  firebase_core_platform_interface: any
  mockito: ^5.4.4
  build_runner: ^2.4.8
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  generate: true
