apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: redis-scaledobject
  namespace: truxify
  labels:
    app: redis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redis-deployment
  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: redis
    metadata:
      address: redis-service:6379
      password: ""
      database: "0"
      listName: orders
      listLength: "100"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: postgres-scaledobject
  namespace: truxify
  labels:
    app: postgres
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: postgres-deployment
  minReplicaCount: 1
  maxReplicaCount: 3
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: postgresql
    metadata:
      connection: postgresql://postgres:password@postgres-service:5432/truxify
      query: "SELECT COUNT(*) FROM orders WHERE status = 'PENDING';"
      targetQueryValue: "50"