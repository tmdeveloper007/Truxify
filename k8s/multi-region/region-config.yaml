apiVersion: v1
kind: ConfigMap
metadata:
  name: region-config
  namespace: truxify
data:
  regions: |
    [
      {
        "name": "us-east-1",
        "cluster": "truxify-us-east",
        "endpoint": "https://us-east.truxify.com",
        "primary": true,
        "weight": 33
      },
      {
        "name": "eu-west-1",
        "cluster": "truxify-eu-west",
        "endpoint": "https://eu-west.truxify.com",
        "primary": false,
        "weight": 33
      },
      {
        "name": "ap-south-1",
        "cluster": "truxify-ap-south",
        "endpoint": "https://ap-south.truxify.com",
        "primary": false,
        "weight": 34
      }
    ]
  active_regions: "us-east-1,eu-west-1,ap-south-1"
  failover_timeout: "30s"
  health_check_interval: "10s"