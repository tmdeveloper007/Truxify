apiVersion: v1
kind: Service
metadata:
  name: global-lb
  namespace: truxify
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:xxx:certificate/xxx"
spec:
  type: LoadBalancer
  ports:
  - port: 443
    targetPort: 5000
    name: https
  - port: 80
    targetPort: 5000
    name: http
  selector:
    app: truxify
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: global-ingress
  namespace: truxify
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - truxify.com
    - *.truxify.com
    secretName: truxify-tls
  rules:
  - host: truxify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: global-lb
            port:
              number: 80