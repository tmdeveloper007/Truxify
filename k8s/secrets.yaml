apiVersion: v1
kind: Secret
metadata:
  name: truxify-secrets
  namespace: truxify
type: Opaque
data:
  # Base64 encoded values (echo -n "value" | base64)
  ML_API_KEY: <base64-encoded-ml-api-key>
  POLYGON_RPC_URL: <base64-encoded-polygon-rpc-url>
  ESCROW_CONTRACT_ADDRESS: <base64-encoded-escrow-address>
  RELAYER_WALLET_PRIVATE_KEY: <base64-encoded-private-key>
  SUPABASE_URL: <base64-encoded-supabase-url>
  SUPABASE_KEY: <base64-encoded-supabase-key>
  JWT_SECRET: <base64-encoded-jwt-secret>