apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-blue-green
  namespace: truxify
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: truxify/api:latest
        ports:
        - containerPort: 5000
  strategy:
    blueGreen:
      activeService: api-service-active
      previewService: api-service-preview
      autoPromotionEnabled: false
      autoPromotionSeconds: 300
      scaleDownDelaySeconds: 120
      previewReplicaCount: 1
      abortScaleDownDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: api-service-active
  namespace: truxify
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: api-service-preview
  namespace: truxify
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: bg-analysis
  namespace: truxify
spec:
  args:
  - name: service-name
  metrics:
  - name: error-rate
    interval: 30s
    successCondition: result[0] < 0.05
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.istio-system:9090
        query: |
          sum(rate(istio_requests_total{reporter="destination",destination_service=~"{{args.service-name}}.*",response_code=~"5.."}[5m])) / 
          sum(rate(istio_requests_total{reporter="destination",destination_service=~"{{args.service-name}}.*"}[5m]))