apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ml-analysis
  namespace: truxify
spec:
  args:
  - name: service-name
  metrics:
  - name: latency-p90
    interval: 30s
    successCondition: result[0] <= 0.8
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.istio-system:9090
        query: |
          histogram_quantile(0.90, 
            sum(rate(istio_request_duration_milliseconds_bucket{reporter="destination",destination_service=~"{{args.service-name}}.*"}[5m])) by (le)
          ) / 1000
  - name: error-rate
    interval: 30s
    successCondition: result[0] < 0.03
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.istio-system:9090
        query: |
          sum(rate(istio_requests_total{reporter="destination",destination_service=~"{{args.service-name}}.*",response_code=~"5.."}[5m])) / 
          sum(rate(istio_requests_total{reporter="destination",destination_service=~"{{args.service-name}}.*"}[5m]))
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ml-rollout
  namespace: truxify
  labels:
    app: ml
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml
  template:
    metadata:
      labels:
        app: ml
    spec:
      containers:
      - name: ml-engine
        image: truxify/ml:latest
        ports:
        - containerPort: 8000
  strategy:
    canary:
      steps:
      - setWeight: 10
      - pause:
          duration: 30s
      - setWeight: 30
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 60s
      - setWeight: 100
      analysis:
        templates:
        - templateName: ml-analysis
        args:
        - name: service-name
          value: ml-engine-service