apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-rollout-rollback
  namespace: truxify
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: truxify/api:latest
  strategy:
    canary:
      steps:
      - setWeight: 10
      - pause:
          duration: 30s
      analysis:
        templates:
        - templateName: rollback-analysis
        startingStep: 1
        args:
        - name: service-name
          value: api-service
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: rollback-analysis
  namespace: truxify
spec:
  args:
  - name: service-name
  metrics:
  - name: error-rate
    interval: 10s
    successCondition: result[0] < 0.05
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.istio-system:9090
        query: |
          sum(rate(istio_requests_total{reporter="destination",destination_service=~"{{args.service-name}}.*",response_code=~"5.."}[5m])) / 
          sum(rate(istio_requests_total{reporter="destination",destination_service=~"{{args.service-name}}.*"}[5m]))
  - name: latency
    interval: 10s
    successCondition: result[0] <= 1.0
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.istio-system:9090
        query: |
          histogram_quantile(0.95, 
            sum(rate(istio_request_duration_milliseconds_bucket{reporter="destination",destination_service=~"{{args.service-name}}.*"}[5m])) by (le)
          ) / 1000