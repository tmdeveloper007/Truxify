
﻿apiVersion: networking.istio.io/v1beta1

apiVersion: networking.istio.io/v1beta1

kind: DestinationRule
metadata:
  name: truxify-destination-rule
  namespace: truxify
spec:
  host: api-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30ms
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

  subsets:
  - name: v1
    labels:
      version: v1
    trafficPolicy:
      loadBalancer:
        simple: LEAST_CONN
  - name: v2
    labels:
      version: v2
    trafficPolicy:
      loadBalancer:
        simple: RANDOM
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ml-destination-rule
  namespace: truxify
spec:
  host: ml-engine-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 30ms
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 20s
      baseEjectionTime: 20s
      maxEjectionPercent: 30
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: redis-destination-rule
  namespace: truxify
spec:
  host: redis-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
        connectTimeout: 10ms
    loadBalancer:
      simple: ROUND_ROBIN

