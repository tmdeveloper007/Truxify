# Shard North
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shard-north
  namespace: truxify
  labels:
    app: truxify
    component: shard
    shard: north
spec:
  replicas: 1
  selector:
    matchLabels:
      app: truxify
      component: shard
      shard: north
  template:
    metadata:
      labels:
        app: truxify
        component: shard
        shard: north
    spec:
      containers:
      - name: postgres
        image: postgis/postgis:15-3.3-alpine
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: truxify-secrets
              key: SHARD_PASSWORD
        - name: POSTGRES_DB
          value: truxify_north
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: shard-north-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: shard-north-storage
        persistentVolumeClaim:
          claimName: shard-north-pvc
