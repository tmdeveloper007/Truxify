apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: truxify
  labels:
    app: truxify
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: truxify
      component: api
  template:
    metadata:
      labels:
        app: truxify
        component: api
    spec:
      containers:
      - name: api
        image: truxify/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: truxify-config
        - secretRef:
            name: truxify-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /api/health/startup
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 30
      restartPolicy: Always