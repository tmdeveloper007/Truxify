apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: truxify
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/BhakktiGautam/Truxify
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: truxify
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 5