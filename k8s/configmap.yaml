apiVersion: v1
kind: ConfigMap
metadata:
  name: truxify-config
  namespace: truxify
data:
  NODE_ENV: production
  PORT: "5000"
  MONGODB_DB_NAME: truxify_telemetry
  REDIS_URL: redis://redis-service:6379
  ML_ENGINE_URL: http://ml-engine-service:8000
  ORACLE_CONSENSUS_THRESHOLD: "2"
  FRAUD_THRESHOLD: "0.7"
  WEBRTC_ENABLED: "true"
  SHARD_NORTH_HOST: shard-north-service
  SHARD_SOUTH_HOST: shard-south-service
  SHARD_EAST_HOST: shard-east-service
  SHARD_WEST_HOST: shard-west-service