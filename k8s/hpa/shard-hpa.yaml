apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shard-hpa
  namespace: truxify
  labels:
    app: truxify
    component: shard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shard-north
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
