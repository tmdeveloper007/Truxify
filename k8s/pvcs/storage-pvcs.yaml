# Shard PVCs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shard-north-pvc
  namespace: truxify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
